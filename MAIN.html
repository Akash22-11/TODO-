<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CYBER TASKS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <style>
    /* ─────────────────────────────────────
       RESET & ROOT VARIABLES
    ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:      #00f5ff;
      --magenta:   #ff00e5;
      --lime:      #a3ff00;
      --orange:    #ff9500;
      --violet:    #7b61ff;
      --red:       #ff2d55;
      --bg:        #03000f;
      --surface:   rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.08);
      --text:      rgba(255,255,255,0.88);
      --text-dim:  rgba(255,255,255,0.28);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────
       ANIMATED MESH BACKGROUND
    ───────────────────────────────────── */
    #bg-mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 15% 20%,  rgba(0,245,255,0.11)  0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 75%,  rgba(255,0,229,0.13)  0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 50% 50%,  rgba(163,255,0,0.04)  0%, transparent 70%),
        var(--bg);
      animation: meshPulse 9s ease-in-out infinite alternate;
    }
    /* CRT scanlines */
    #bg-mesh::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
    }
    @keyframes meshPulse {
      0%   { opacity: 0.80; }
      50%  { opacity: 1.00; }
      100% { opacity: 0.85; }
    }

    /* Perspective grid */
    #grid-lines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      opacity: 0.14;
      background-image:
        linear-gradient(rgba(0,245,255,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.4) 1px, transparent 1px);
      background-size: 60px 60px;
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
      mask-image:         radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    }

    /* ─────────────────────────────────────
       LAYOUT
    ───────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 16px 100px;
    }

    /* ─────────────────────────────────────
       HEADER
    ───────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 38px;
      position: relative;
    }

    .header-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--cyan);
      letter-spacing: 0.22em;
      margin-bottom: 10px;
      opacity: 0.75;
    }

    .cursor-blink {
      display: inline-block;
      animation: blink 1s step-end infinite;
      color: var(--cyan);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 2.8rem;
      line-height: 1.05;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #00f5ff 0%, #ff00e5 50%, #a3ff00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 22px rgba(0,245,255,0.5));
      animation: titleLoad 0.8s ease forwards;
      opacity: 0;
    }
    @keyframes titleLoad {
      from { opacity:0; transform: translateY(-16px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.16em;
      margin-top: 8px;
    }

    /* ─────────────────────────────────────
       FLOATING PARTICLES
    ───────────────────────────────────── */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      bottom: 0;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)      rotate(0deg);   opacity: 0.7; }
      50%  { opacity: 1; }
      100% { transform: translateY(-120px) rotate(180deg); opacity: 0;   }
    }

    /* ─────────────────────────────────────
       GLASS CARD
    ───────────────────────────────────── */
    .card {
      width: 100%; max-width: 590px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 20px;
      padding: 28px;
      box-shadow:
        0 0 80px rgba(0,245,255,0.07),
        0 30px 60px rgba(0,0,0,0.5);
      animation: cardLoad 0.6s 0.2s ease both;
    }
    @keyframes cardLoad {
      from { opacity:0; transform: translateY(24px) scale(0.98); }
      to   { opacity:1; transform: translateY(0)    scale(1); }
    }

    /* ─────────────────────────────────────
       PROGRESS BAR
    ───────────────────────────────────── */
    #progress-wrap { margin-bottom: 24px; display: none; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.12em;
    }
    #progress-label {
      color: var(--lime);
      text-shadow: 0 0 8px var(--lime);
    }
    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--lime));
      box-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(163,255,0,0.35);
      transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
    }

    /* ─────────────────────────────────────
       INPUT ROW
    ───────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    #task-input {
      flex: 1;
      padding: 13px 16px;
      border-radius: 12px;
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.25);
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.93rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #task-input::placeholder { color: rgba(0,245,255,0.35); }
    #task-input:focus {
      border-color: var(--cyan);
      box-shadow:
        0 0 0 1px var(--cyan),
        0 0 22px rgba(0,245,255,0.22),
        inset 0 0 14px rgba(0,245,255,0.05);
    }

    #add-btn {
      padding: 13px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      color: #000;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      box-shadow:
        0 0 18px rgba(0,245,255,0.4),
        0 0 40px rgba(255,0,229,0.25);
      transition: transform 0.15s, box-shadow 0.25s, filter 0.25s;
    }
    #add-btn:hover {
      transform: scale(1.06);
      box-shadow:
        0 0 30px rgba(0,245,255,0.7),
        0 0 60px rgba(255,0,229,0.45);
      filter: brightness(1.1);
    }
    #add-btn:active { transform: scale(0.95); }
    #add-btn svg { flex-shrink: 0; }

    /* ─────────────────────────────────────
       FILTER TABS + BADGE ROW
    ───────────────────────────────────── */
    .controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-tabs { display: flex; gap: 6px; }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255,255,255,0.38);
      transition: all 0.25s;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, rgba(0,245,255,0.18), rgba(255,0,229,0.13));
      border-color: rgba(0,245,255,0.5);
      color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,245,255,0.2);
    }

    #task-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,245,255,0.08);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 999px;
      padding: 4px 13px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--cyan);
    }
    @keyframes badgePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.28); }
      100% { transform: scale(1); }
    }
    .badge-pop { animation: badgePop 0.3s ease; }

    /* ─────────────────────────────────────
       TASK LIST
    ───────────────────────────────────── */
    #task-list { min-height: 60px; }

    .empty-msg {
      text-align: center;
      padding: 44px 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.76rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.1em;
      line-height: 2;
    }

    /* ─────────────────────────────────────
       TASK ITEM
    ───────────────────────────────────── */
    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;

      /* Entry animation */
      animation: slideIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateX(-28px) scaleY(0.82); }
      60%  { opacity:1; transform: translateX(4px)   scaleY(1.02); }
      to   { opacity:1; transform: translateX(0)     scaleY(1); }
    }
    @keyframes slideOut {
      from { opacity:1; transform:translateX(0)    scaleY(1);   max-height:80px; margin-bottom:12px; padding:14px 16px; }
      to   { opacity:0; transform:translateX(38px) scaleY(0);   max-height:0;    margin-bottom:0;    padding:0 16px; }
    }
    .task-item.removing {
      animation: slideOut 0.34s cubic-bezier(0.55,0,1,0.45) forwards;
    }

    .task-item:hover {
      border-color: rgba(0,245,255,0.32);
      box-shadow: 0 0 22px rgba(0,245,255,0.1), 0 6px 24px rgba(0,0,0,0.35);
      transform: translateX(3px);
    }

    /* Left accent glow strip */
    .task-accent {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    /* Custom checkbox */
    .check-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 2px;
      transition: transform 0.2s;
    }
    .check-btn:active { transform: scale(0.82); }
    .check-icon-empty {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      transition: border-color 0.25s;
    }
    .task-item:hover .check-icon-empty { border-color: rgba(255,255,255,0.45); }

    .check-icon-done {
      width: 22px; height: 22px;
      display: none;
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.04em;
      line-height: 1.4;
      color: var(--text);
      word-break: break-word;
      position: relative;
      transition: color 0.4s;
    }
    .task-text::after {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      height: 2px; width: 0;
      border-radius: 2px;
      transition: width 0.45s cubic-bezier(0.22,1,0.36,1);
    }
    .task-item.done .task-text {
      color: var(--text-dim);
    }
    .task-item.done .task-text::after {
      width: 100%;
    }

    /* Timestamp */
    .task-time {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.66rem;
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Delete button */
    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s, filter 0.2s;
    }
    .del-btn:hover {
      color: var(--red);
      filter: drop-shadow(0 0 8px var(--red));
      transform: scale(1.22) rotate(8deg);
    }
    .del-btn:active { transform: scale(0.88); }

    /* ─────────────────────────────────────
       FOOTER ACTIONS
    ───────────────────────────────────── */
    #footer-actions {
      display: none;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    #clear-btn {
      background: transparent;
      border: 1px solid rgba(255,45,85,0.3);
      color: rgba(255,45,85,0.65);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.1em;
      transition: all 0.22s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    #clear-btn:hover {
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 14px rgba(255,45,85,0.3);
    }

    /* ─────────────────────────────────────
       BOTTOM SIGNATURE
    ───────────────────────────────────── */
    .sig {
      margin-top: 30px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.11);
      letter-spacing: 0.2em;
      text-align: center;
    }

    /* ─────────────────────────────────────
       SCROLLBAR
    ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,245,255,0.22);
      border-radius: 999px;
    }

    /* ─────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────── */
    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .card { padding: 20px; }
      #add-btn span { display: none; }
      #add-btn { padding: 13px 15px; }
    }
  </style>
</head>
<body>

  <!-- Atmospheric layers -->
  <div id="bg-mesh"></div>
  <div id="grid-lines"></div>

  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="particles" id="particles"></div>

      <div class="header-tag">
        <!-- Terminal icon -->
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        SYSTEM.TASKS_v2.0
        <span class="cursor-blink">█</span>
      </div>

      <h1>CYBER<br>TASKS</h1>

      <p class="subtitle">MANAGE YOUR MISSION OBJECTIVES</p>
    </header>

    <!-- ── Main Card ── -->
    <div class="card">

      <!-- Progress bar (hidden until tasks exist) -->
      <div id="progress-wrap">
        <div class="progress-header">
          <span>PROGRESS</span>
          <span id="progress-label">0/0 [0%]</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill"></div>
        </div>
      </div>

      <!-- Input row -->
      <div class="input-row">
        <input id="task-input" type="text" placeholder="> ENTER OBJECTIVE..." autocomplete="off" spellcheck="false"/>
        <button id="add-btn">
          <!-- Plus icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>ADD</span>
        </button>
      </div>

      <!-- Controls: filter tabs + badge -->
      <div class="controls-row">
        <div class="filter-tabs">
          <button class="filter-btn active" data-filter="all">ALL</button>
          <button class="filter-btn" data-filter="active">ACTIVE</button>
          <button class="filter-btn" data-filter="done">DONE</button>
        </div>
        <div id="task-badge">
          <!-- Zap icon -->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span id="badge-count">0 TASKS</span>
        </div>
      </div>

      <!-- Task list -->
      <div id="task-list">
        <div class="empty-msg" id="empty-msg">> TASK QUEUE EMPTY. ENTER OBJECTIVE_</div>
      </div>

      <!-- Footer: clear completed -->
      <div id="footer-actions">
        <button id="clear-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          <span id="clear-label">PURGE COMPLETED [0]</span>
        </button>
      </div>
    </div>

    <div class="sig">CYBER_TASKS // HTML + VANILLA JS + CSS ANIMATIONS</div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    //  STATE
    // ─────────────────────────────────────────────
    let tasks  = JSON.parse(localStorage.getItem('cyber-tasks') || '[]');
    let filter = 'all'; // 'all' | 'active' | 'done'

    // Neon accent colors cycling per task index
    const ACCENTS = ['#00f5ff','#ff00e5','#a3ff00','#ff9500','#7b61ff'];

    // Strikethrough gradient per accent (matches accent → cyan)
    const STRIKE_COLORS = [
      'linear-gradient(90deg,#a3ff00,#00f5ff)',
      'linear-gradient(90deg,#00f5ff,#a3ff00)',
      'linear-gradient(90deg,#ff00e5,#00f5ff)',
      'linear-gradient(90deg,#ff9500,#a3ff00)',
      'linear-gradient(90deg,#7b61ff,#00f5ff)',
    ];

    // ─────────────────────────────────────────────
    //  PERSIST
    // ─────────────────────────────────────────────
    function save() {
      localStorage.setItem('cyber-tasks', JSON.stringify(tasks));
    }

    // ─────────────────────────────────────────────
    //  DERIVED
    // ─────────────────────────────────────────────
    function totalCount()  { return tasks.length; }
    function doneCount()   { return tasks.filter(t => t.done).length; }
    function activeCount() { return tasks.filter(t => !t.done).length; }

    function filteredTasks() {
      if (filter === 'active') return tasks.filter(t => !t.done);
      if (filter === 'done')   return tasks.filter(t =>  t.done);
      return tasks;
    }

    // ─────────────────────────────────────────────
    //  ADD TASK
    // ─────────────────────────────────────────────
    function addTask() {
      const input = document.getElementById('task-input');
      const text  = input.value.trim();
      if (!text) { input.classList.add('shake'); setTimeout(()=>input.classList.remove('shake'),400); return; }

      const now  = new Date();
      const time = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

      tasks.unshift({ id: Date.now(), text, done: false, time });
      save();
      input.value = '';
      popBadge();
      render();
      input.focus();
    }

    // ─────────────────────────────────────────────
    //  TOGGLE COMPLETE
    // ─────────────────────────────────────────────
    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) { task.done = !task.done; save(); render(); }
    }

    // ─────────────────────────────────────────────
    //  DELETE TASK  (animate out, then remove)
    // ─────────────────────────────────────────────
    function deleteTask(id) {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) {
        el.classList.add('removing');
        setTimeout(() => {
          tasks = tasks.filter(t => t.id !== id);
          save();
          render();
        }, 330);
      }
    }

    // ─────────────────────────────────────────────
    //  CLEAR COMPLETED
    // ─────────────────────────────────────────────
    function clearCompleted() {
      // Animate all done items out first
      document.querySelectorAll('.task-item.done').forEach(el => {
        el.classList.add('removing');
      });
      setTimeout(() => {
        tasks = tasks.filter(t => !t.done);
        save();
        render();
      }, 340);
    }

    // ─────────────────────────────────────────────
    //  BADGE POP ANIMATION
    // ─────────────────────────────────────────────
    function popBadge() {
      const badge = document.getElementById('task-badge');
      badge.classList.remove('badge-pop');
      void badge.offsetWidth; // reflow to restart
      badge.classList.add('badge-pop');
    }

    // ─────────────────────────────────────────────
    //  UPDATE PROGRESS BAR
    // ─────────────────────────────────────────────
    function updateProgress() {
      const total = totalCount();
      const done  = doneCount();
      const pct   = total === 0 ? 0 : Math.round((done / total) * 100);

      const wrap  = document.getElementById('progress-wrap');
      wrap.style.display = total > 0 ? 'block' : 'none';

      document.getElementById('progress-label').textContent = `${done}/${total} [${pct}%]`;
      document.getElementById('progress-fill').style.width  = `${pct}%`;
    }

    // ─────────────────────────────────────────────
    //  UPDATE BADGE COUNT
    // ─────────────────────────────────────────────
    function updateBadge() {
      const total = totalCount();
      document.getElementById('badge-count').textContent =
        `${total} TASK${total !== 1 ? 'S' : ''}`;
    }

    // ─────────────────────────────────────────────
    //  UPDATE FOOTER CLEAR BUTTON
    // ─────────────────────────────────────────────
    function updateFooter() {
      const done    = doneCount();
      const actions = document.getElementById('footer-actions');
      actions.style.display = done > 0 ? 'flex' : 'none';
      document.getElementById('clear-label').textContent = `PURGE COMPLETED [${done}]`;
    }

    // ─────────────────────────────────────────────
    //  BUILD TASK ITEM HTML
    // ─────────────────────────────────────────────
    function createTaskEl(task, globalIndex) {
      const accIdx  = globalIndex % ACCENTS.length;
      const accent  = ACCENTS[accIdx];
      const strike  = STRIKE_COLORS[accIdx];

      const div = document.createElement('div');
      div.className = `task-item${task.done ? ' done' : ''}`;
      div.dataset.id = task.id;

      // Accent strip
      div.innerHTML = `
        <div class="task-accent" style="background:${accent};box-shadow:0 0 12px ${accent},0 0 26px ${accent};"></div>

        <!-- Checkbox -->
        <button class="check-btn" onclick="toggleTask(${task.id})" title="Toggle complete">
          ${task.done
            ? `<svg class="check-icon-done" style="display:block" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a3ff00" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
            : `<div class="check-icon-empty"></div>`
          }
        </button>

        <!-- Text -->
        <span class="task-text" style="--strike:${strike}">${escapeHTML(task.text)}</span>

        <!-- Time -->
        <span class="task-time">${task.time}</span>

        <!-- Delete -->
        <button class="del-btn" onclick="deleteTask(${task.id})" title="Delete task">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      `;

      // Set strikethrough gradient on ::after via inline CSS injection trick
      // (CSS custom property approach)
      const style = div.querySelector('.task-text');
      style.style.setProperty('--strike', strike);

      // Inject the ::after background via a <style> scoped approach
      // We use a unique class per accent index instead
      div.querySelector('.task-text').classList.add(`strike-${accIdx}`);

      return div;
    }

    // Inject strikethrough styles once
    (function injectStrikeStyles() {
      const s = document.createElement('style');
      STRIKE_COLORS.forEach((grad, i) => {
        s.textContent += `.strike-${i}::after { background: ${grad}; box-shadow: 0 0 8px #a3ff00; }\n`;
      });
      document.head.appendChild(s);
    })();

    function escapeHTML(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─────────────────────────────────────────────
    //  RENDER
    // ─────────────────────────────────────────────
    function render() {
      const list   = document.getElementById('task-list');
      const empty  = document.getElementById('empty-msg');
      const shown  = filteredTasks();

      // Clear existing task items (keep empty-msg)
      list.querySelectorAll('.task-item').forEach(el => el.remove());

      if (shown.length === 0) {
        empty.style.display = 'block';
        const msgs = {
          all:    '> TASK QUEUE EMPTY. ENTER OBJECTIVE_',
          active: '> ALL TASKS COMPLETE. MISSION SUCCESS_',
          done:   '> NO COMPLETED TASKS_',
        };
        empty.textContent = msgs[filter];
      } else {
        empty.style.display = 'none';
        shown.forEach((task, i) => {
          // Find global index for accent color consistency
          const globalIdx = tasks.indexOf(task);
          const el = createTaskEl(task, globalIdx);
          list.appendChild(el);
        });
      }

      updateProgress();
      updateBadge();
      updateFooter();
    }

    // ─────────────────────────────────────────────
    //  FILTER BUTTONS
    // ─────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    // ─────────────────────────────────────────────
    //  ADD BUTTON & ENTER KEY
    // ─────────────────────────────────────────────
    document.getElementById('add-btn').addEventListener('click', addTask);
    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // ─────────────────────────────────────────────
    //  CLEAR COMPLETED
    // ─────────────────────────────────────────────
    document.getElementById('clear-btn').addEventListener('click', clearCompleted);

    // ─────────────────────────────────────────────
    //  FLOATING PARTICLES (generated dynamically)
    // ─────────────────────────────────────────────
    const particleConfig = [
      { color:'#00f5ff', left:10, delay:0,   size:4 },
      { color:'#ff00e5', left:25, delay:1.2, size:3 },
      { color:'#a3ff00', left:55, delay:0.6, size:5 },
      { color:'#00f5ff', left:75, delay:2.1, size:3 },
      { color:'#ff00e5', left:88, delay:0.9, size:4 },
      { color:'#a3ff00', left:40, delay:1.7, size:3 },
    ];
    const pContainer = document.getElementById('particles');
    particleConfig.forEach(p => {
      const dot = document.createElement('div');
      dot.className = 'particle';
      dot.style.cssText = `
        left:${p.left}%;
        width:${p.size}px; height:${p.size}px;
        background:${p.color};
        box-shadow:0 0 6px ${p.color};
        animation-duration:${2.8 + p.delay}s;
        animation-delay:${p.delay}s;
      `;
      pContainer.appendChild(dot);
    });

    // ─────────────────────────────────────────────
    //  INPUT SHAKE (for empty submit)
    // ─────────────────────────────────────────────
    const shakeStyle = document.createElement('style');
    shakeStyle.textContent = `
      @keyframes shake {
        0%,100%{transform:translateX(0)}
        20%    {transform:translateX(-6px)}
        40%    {transform:translateX(6px)}
        60%    {transform:translateX(-4px)}
        80%    {transform:translateX(4px)}
      }
      .shake { animation: shake 0.35s ease !important; border-color: var(--magenta) !important; box-shadow: 0 0 14px rgba(255,0,229,0.4) !important; }
    `;
    document.head.appendChild(shakeStyle);

    // ─────────────────────────────────────────────
    //  INITIAL RENDER
    // ─────────────────────────────────────────────
    render();
    document.getElementById('task-input').focus();
  </script>
</body>
</html>
